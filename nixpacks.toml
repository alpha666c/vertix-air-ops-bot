# Pin a supported runtime — Nixpacks default Node 18 is EOL and removed from Nix.
[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install"]

[phases.build]
cmds = ["bun run build", "cd packages/web && bun run db:push:ci"]

[start]
cmd = "cd packages/web && bun src/server.ts"
